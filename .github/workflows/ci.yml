name: ci

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt ruff
      - name: Ruff
        run: ruff check .
      - name: Pytest
        run: pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install backend dependencies for E2E
        run: pip install -r requirements.txt
        working-directory: .
      - name: Install dependencies
        run: npm ci
      - name: Frontend tests
        run: npm run test
      - name: Frontend build
        run: npm run build
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Frontend E2E
        run: npm run test:e2e

  containers:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -f backend/Dockerfile .
      - name: Build frontend image
        run: docker build -f frontend/Dockerfile .

  docker-smoke:
    runs-on: ubuntu-latest
    needs: [containers]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
      - name: Install smoke dependencies
        run: pip install -r requirements.txt
      - name: Create Docker env
        run: |
          cp .env.example .env
          python - <<'PY'
          from pathlib import Path
          env_path = Path(".env")
          values = {
              "STELLA_FRONTEND_ORIGIN": "http://localhost:5173",
              "STELLA_USERNAME": "stella",
              "STELLA_PASSWORD": "ci-smoke-password",
              "STELLA_JWT_SECRET": "ci-smoke-secret-0123456789abcdefghijklmnop",
          }
          lines = []
          for line in env_path.read_text(encoding="utf-8").splitlines():
              if "=" not in line or line.lstrip().startswith("#"):
                  lines.append(line)
                  continue
              key = line.split("=", 1)[0].strip()
              lines.append(f"{key}={values.get(key, line.split('=', 1)[1].strip())}")
          env_path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY
      - name: Docker smoke
        run: python tools/smoke/docker_smoke.py --mode all
